    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: linear-gradient(180deg, #FFF9E6 0%, #FFD1D1 100%);
            margin: 0;
            padding: 0;
            /* 修改：允許垂直捲動，防止按鈕被裁切 */
            overflow-y: auto;
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }

        #root {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        .brutal-card-heavy {
            background: white;
            border: 5px solid #000;
            box-shadow: 10px 10px 0px 0px #000;
        }

        .brutal-btn {
            border: 4px solid #000;
            box-shadow: 6px 6px 0px 0px #000;
            transition: all 0.1s ease;
            touch-action: manipulation;
        }

        .brutal-btn:active:not(:disabled) {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px 0px #000;
        }

        .brutal-input {
            border: 4px solid #000;
            border-radius: 16px;
            padding: 14px;
            outline: none;
            font-weight: 800;
            width: 100%;
            background: white;
            font-size: 20px;
        }

        .underline-input {
            border: none;
            border-bottom: 5px solid #5D5FEF;
            background: #F8FAFC;
            padding: 14px;
            width: 100%;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            outline: none;
        }

        .syllable-bubble {
            border: 3px solid #000;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 16px;
        }

        .mic-recording {
            animation: pulse-red 0.8s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.6); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }

        .pattern-dots {
            background-image: radial-gradient(#00000022 1.5px, transparent 1.5px);
            background-size: 14px 14px;
        }

        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>

        const vocabBank = [
            { word: "warn", type: "vt.", meaning: "警告", ipa: "/wɔːrn/", s: "Bill's parents ___ him not to go mountain climbing.", a: "warned", t: "比爾的父母警告他不要去登山。", syllables: ["warn"], stress: 0, family: "warning (n.) 警告" },
            { word: "warning", type: "n.", meaning: "警告", ipa: "/ˈwɔːr.nɪŋ/", s: "The government issued a typhoon ___ this morning.", a: "warning", t: "政府今天早上發布了颱風警告。", syllables: ["warn", "ing"], stress: 0, family: "warn (v.) 警告" },
            { word: "announcement", type: "n.", meaning: "公告；通知", ipa: "/əˈnaʊns.mənt/", s: "The teacher made an ___ about the final exam.", a: "announcement", t: "老師宣布了關於期末考的公告。", syllables: ["an", "nounce", "ment"], stress: 1, family: "announce (v.) 宣布" },
            { word: "announce", type: "vt.", meaning: "宣布", ipa: "/əˈnaʊns/", s: "The principal ___ that the sports day was postponed.", a: "announced", t: "校長宣布運動會延期了。", syllables: ["an", "nounce"], stress: 1, family: "announcement (n.) 公告" },
            { word: "research", type: "n.", meaning: "研究", ipa: "/ˈriː.sɜːrtʃ/", s: "Dr. Smith is doing some ___ into dolphin communication.", a: "research", t: "史密斯博士正在研究海豚的通訊方式。", syllables: ["re", "search"], stress: 0, family: "researcher (n.) 研究人員" },

            { word: "flavor", type: "n.", meaning: "味道；風味", ipa: "/ˈfleɪ.vər/", s: "This mountain tea has a gentle ___ of flowers.", a: "flavor", t: "這種山茶帶有淡淡花香。", syllables: ["fla", "vor"], stress: 0, family: "flavoring (n.) 調味料" },

            { word: "normally", type: "adv.", meaning: "通常", ipa: "/ˈnɔːr.mə.li/", s: "Uncle Frank ___ reads the newspaper over breakfast.", a: "normally", t: "法蘭克叔叔通常邊吃早餐邊看報紙。", syllables: ["nor", "mal", "ly"], stress: 0, family: "normal (adj.) 正常的" },
            { word: "normal", type: "adj.", meaning: "正常的", ipa: "/ˈnɔːr.məl/", s: "It's ___ to feel nervous before a big speech.", a: "normal", t: "在大演講前感到緊張是正常的。", syllables: ["nor", "mal"], stress: 0, family: "normally (adv.) 通常" },
            { word: "distinguish", type: "v.", meaning: "分辨；區別", ipa: "/dɪˈstɪŋ.ɡwɪʃ/", s: "Even their parents can't ___ between the twins.", a: "distinguish", t: "甚至連父母都分不出這對雙胞胎。", syllables: ["dis", "tin", "guish"], stress: 1, family: "-" },
            { word: "accurately", type: "adv.", meaning: "精確地", ipa: "/ˈæk.jə.rət.li/", s: "Scientists cannot predict earthquakes ___ yet.", a: "accurately", t: "科學家目前尚未能準確預測地震。", syllables: ["ac", "cu", "rate", "ly"], stress: 0, family: "accurate (adj.) 精確的" },
            { word: "accurate", type: "adj.", meaning: "精確的", ipa: "/ˈæk.jə.rət/", s: "The weather report wasn't very ___ today.", a: "accurate", t: "今天的氣象預報不是很準確。", syllables: ["ac", "cu", "rate"], stress: 0, family: "accurately (adv.) 精確地" },
            { word: "function", type: "v.", meaning: "運作；發揮功能", ipa: "/ˈfʌŋk.ʃən/", s: "This couch also ___ as a guest bed.", a: "functions", t: "這張沙發也可以充當客房床鋪。", syllables: ["func", "tion"], stress: 0, family: "functional (adj.) 實用的" },
            { word: "functional", type: "adj.", meaning: "實用的", ipa: "/ˈfʌŋk.ʃən.əl/", s: "This simple furniture is very ___.", a: "functional", t: "這件簡單的家具非常實用。", syllables: ["func", "tion", "al"], stress: 0, family: "function (v.) 運作" },
            { word: "blame", type: "vt.", meaning: "歸咎；責怪", ipa: "/bleɪm/", s: "The police ___ the driver for the accident.", a: "blamed", t: "警方將意外歸咎於司機。", syllables: ["blame"], stress: 0, family: "-" },
            { word: "affect", type: "vt.", meaning: "影響", ipa: "/əˈfekt/", s: "Global warming has greatly ___ wild animals.", a: "affected", t: "全球暖化已極大影響了野生動物。", syllables: ["af", "fect"], stress: 1, family: "-" },
            { word: "passenger", type: "n.", meaning: "乘客", ipa: "/ˈpæs.ən.dʒər/", s: "The ___ on the plane were glad to hear the news.", a: "passengers", t: "飛機上的乘客很高興聽到消息。", syllables: ["pas", "sen", "ger"], stress: 0, family: "-" },
            { word: "distract", type: "vt.", meaning: "使分心", ipa: "/dɪˈstrækt/", s: "Loud music kept ___ Ken from his reading.", a: "distracting", t: "大聲的音樂一直讓肯分心。", syllables: ["dis", "tract"], stress: 1, family: "distraction (n.) 分心物" },
            { word: "distraction", type: "n.", meaning: "分心物", ipa: "/dɪˈstræk.ʃən/", s: "Turn off your phone to avoid ___ during study.", a: "distractions", t: "讀書時關掉手機以避免分心。", syllables: ["dis", "trac", "tion"], stress: 1, family: "distract (v.) 分心" },
            { word: "indicate", type: "vt.", meaning: "指出；顯示", ipa: "/ˈɪn.dɪ.keɪt/", s: "Research clearly ___ that exercise is key to health.", a: "indicates", t: "研究清楚指出運動是健康的關鍵。", syllables: ["in", "di", "cate"], stress: 0, family: "indication (n.) 跡象" },
            { word: "indication", type: "n.", meaning: "跡象", ipa: "/ˌɪn.dɪˈkeɪ.ʃən/", s: "A dark cloud is usually an ___ of rain.", a: "indication", t: "烏雲通常是下雨的跡象。", syllables: ["in", "di", "ca", "tion"], stress: 2, family: "indicate (v.) 指出" },
            { word: "solution", type: "n.", meaning: "解決方法", ipa: "/səˈluː.ʃən/", s: "The government is trying to think of a ___ to pollution.", a: "solution", t: "政府正試圖想出解決污染的方法。", syllables: ["so", "lu", "tion"], stress: 1, family: "solve (v.) 解決" },
            { word: "solve", type: "vt.", meaning: "解決", ipa: "/sɒlv/", s: "Can you help me ___ this difficult math problem?", a: "solve", t: "你能幫我解決這道難題嗎？", syllables: ["solve"], stress: 0, family: "solution (n.) 解決方法" },
            { word: "ingredient", type: "n.", meaning: "成分", ipa: "/ɪnˈɡriː.di.ənt/", s: "Fresh ___ are important for a good meal.", a: "ingredients", t: "新鮮食材對於美味的一餐很重要。", syllables: ["in", "grie", "di", "ent"], stress: 1, family: "-" },
            { word: "recipe", type: "n.", meaning: "食譜", ipa: "/ˈres.ɪ.pi/", s: "Does this book include a ___ for apple pie?", a: "recipe", t: "這本書有包含蘋果派的食譜嗎？", syllables: ["rec", "i", "pe"], stress: 0, family: "-" },
            { word: "comparison", type: "n.", meaning: "比較", ipa: "/kəmˈpær.ɪ.sən/", s: "By ___, life in this city is very expensive.", a: "comparison", t: "相較之下，這座城市的生活費很貴。", syllables: ["com", "par", "i", "son"], stress: 1, family: "compare (v.) 比較" },
            { word: "compare", type: "vt.", meaning: "比較", ipa: "/kəmˈpeər/", s: "Don't ___ yourself with other people.", a: "compare", t: "不要拿自己跟別人比較。", syllables: ["com", "pare"], stress: 1, family: "comparison (n.) 比較" },
            { word: "remain", type: "vi.", meaning: "保持；仍然是", ipa: "/rɪˈmeɪn/", s: "The situation ___ unchanged for many years.", a: "remained", t: "情況多年來一直保持不變。", syllables: ["re", "main"], stress: 1, family: "-" },
            { word: "provide", type: "vt.", meaning: "提供", ipa: "/prəˈvaɪd/", s: "The hotel ___ a nice breakfast for guests.", a: "provides", t: "飯店為房客提供美味早餐。", syllables: ["pro", "vide"], stress: 1, family: "provision (n.) 提供" },
            { word: "provision", type: "n.", meaning: "提供", ipa: "/prəˈvɪʒ.ən/", s: "The ___ of clean water is vital for survival.", a: "provision", t: "提供乾淨的水對生存至關重要。", syllables: ["pro", "vi", "sion"], stress: 1, family: "provide (v.) 提供" }
        ];

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState({ name: '', class: '', no: '', xp: 0 });
            const [quizMode, setQuizMode] = useState(null); 
            const [shuffledQuiz, setShuffledQuiz] = useState([]);
            const [quizIndex, setQuizIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [score, setScore] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [recognitionText, setRecognitionText] = useState('');
            const [currentWordIdx, setCurrentWordIdx] = useState(0);
            const [submitting, setSubmitting] = useState(false);

            const recognitionRef = useRef(null);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.85;
                window.speechSynthesis.speak(u);
            };

            const startQuiz = (mode) => {
                const q = [...vocabBank].sort(() => Math.random() - 0.5).slice(0, 15);
                setShuffledQuiz(q);
                setQuizMode(mode);
                setQuizIndex(0);
                setScore(0);
                setUserInput('');
                setShowFeedback(false);
                setRecognitionText('');
                setView('quiz');
            };

            const checkResult = (resultIsCorrect = null) => {
                const cur = shuffledQuiz[quizIndex];
                let ok = resultIsCorrect;
                if (ok === null) {
                    if(quizMode === 'spell') ok = userInput.trim().toLowerCase() === cur.word.toLowerCase();
                    if(quizMode === 'fill') ok = userInput.trim().toLowerCase() === cur.a.toLowerCase();
                }
                setIsCorrect(ok);
                setShowFeedback(true);
                if (ok || quizMode !== 'speak') {
                    if(ok) setScore(s => s + 1);
                    setTimeout(handleNext, 1500);
                }
            };

            const handleNext = () => {
                if(quizIndex < shuffledQuiz.length - 1) {
                    setQuizIndex(i => i + 1);
                    setUserInput('');
                    setRecognitionText('');
                    setShowFeedback(false);
                    setIsCorrect(null);
                } else handleSubmitScore();
            };

            const handleSubmitScore = async () => {
                setView('result');
                const finalPerc = Math.round((score / 15) * 100);
                if (GOOGLE_SCRIPT_URL) {
                    setSubmitting(true);
                    try {
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                class: user.class, no: user.no, name: user.name, 
                                mode: quizMode.toUpperCase(), score: finalPerc 
                            })
                        });
                    } catch (e) {}
                    setSubmitting(false);
                }
            };

            const handleStartRecording = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { alert("手機瀏覽器不支援錄音。"); return; }
                if (isRecording) { recognitionRef.current?.abort(); return; }

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognitionRef.current = recognition;

                recognition.onstart = () => { setIsRecording(true); setRecognitionText(''); };
                recognition.onresult = (e) => {
                    const speech = e.results[0][0].transcript.toLowerCase().trim().replace(/[.,!?;:]/g, "");
                    const target = shuffledQuiz[quizIndex].word.toLowerCase();
                    setRecognitionText(speech);
                    checkResult(speech === target || speech.includes(target) || target.includes(speech));
                };
                recognition.onerror = () => setIsRecording(false);
                recognition.onend = () => setIsRecording(false);
                recognition.start();
            };

            if (view === 'login') {
                return (
                    <div className="flex-1 flex items-center justify-center p-6">
                        <div className="brutal-card-heavy w-full p-8 rounded-[40px] text-center bg-white shadow-xl animate-pop">
                            <div className="w-20 h-20 bg-[#FDE047] rounded-full border-4 border-black flex items-center justify-center mx-auto mb-6 shadow-[6px_6px_0px_0px_#000]"><Icons.Zap size={40} /></div>
                            <h1 className="text-4xl font-black italic tracking-tighter mb-1 leading-none"><span className="text-[#5D5FEF]">VOCAB</span><span className="text-[#D946EF]">POP</span></h1>
                            <p className="text-slate-400 font-bold text-sm mb-10 tracking-[0.2em] uppercase">Student Login</p>
                            <form className="space-y-6 text-left" onSubmit={e => { e.preventDefault(); if(user.name&&user.class&&user.no) setView('learn'); }}>
                                <div className="flex gap-4">
                                    <div className="flex-1">
                                        <label className="block font-black mb-2 text-xs text-slate-500 uppercase">Class *</label>
                                        <input className="brutal-input" placeholder="104" value={user.class} onChange={e => setUser({...user, class: e.target.value})} required />
                                    </div>
                                    <div className="flex-1">
                                        <label className="block font-black mb-2 text-xs text-slate-500 uppercase">No. *</label>
                                        <input className="brutal-input" placeholder="e.g. 15" value={user.no} onChange={e => setUser({...user, no: e.target.value})} required />
                                    </div>
                                </div>
                                <div>
                                    <label className="block font-black mb-2 text-xs text-slate-500 uppercase">Name *</label>
                                    <input className="brutal-input" placeholder="e.g. 王小明" value={user.name} onChange={e => setUser({...user, name: e.target.value})} required />
                                </div>
                                <button type="submit" className="w-full py-5 bg-[#5D5FEF] text-white rounded-2xl font-black text-xl brutal-btn flex items-center justify-center gap-3 mt-4">START JOURNEY <Icons.ArrowRight size={24} /></button>
                            </form>
                        </div>
                    </div>
                );
            }

            const NavHeader = () => (
                <div className="w-full px-5 pt-5 pb-1 sticky top-0 z-50">
                    <div className="brutal-card bg-white rounded-3xl p-3 flex justify-between items-center shadow-[6px_6px_0px_0px_#000]">
                        <div className="flex items-center gap-3">
                            <Icons.Zap size={22} className="text-yellow-400 fill-current" />
                            <div className="flex flex-col"><span className="font-black text-base italic leading-none text-slate-800 tracking-tighter">VOCABPOP</span><span className="text-[10px] text-slate-400 font-bold uppercase mt-1 leading-none">{user.class}班 {user.no}號 {user.name}</span></div>
                        </div>
                        <div className="bg-black text-white rounded-full px-4 py-1.5 flex items-center gap-2 text-xs font-black tracking-tighter">
                            <span className="text-yellow-400">★ LV.1</span> <span className="text-slate-500">|</span> <span>{user.xp} XP</span>
                        </div>
                    </div>
                    <div className="flex gap-3 mt-4 px-1">
                        <button onClick={() => setView('learn')} className={`flex-1 py-2.5 brutal-btn rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all ${view === 'learn' ? 'bg-[#A5F3FC] translate-y-0.5 shadow-none' : 'bg-white'}`}><Icons.Book size={18} /> LEARN</button>
                        <button onClick={() => setView('coach')} className={`flex-1 py-2.5 brutal-btn rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all ${view === 'coach' ? 'bg-[#F9A8D4] translate-y-0.5 shadow-none' : 'bg-white'}`}><Icons.Coach size={18} /> COACH</button>
                    </div>
                </div>
            );

            if (view === 'learn') {
                const w = vocabBank[currentWordIdx];
                return (
                    <div className="flex-1 flex flex-col pb-10">
                        <NavHeader />
                        <div className="px-5 mt-2 animate-pop">
                            <div className="brutal-card-heavy rounded-[40px] overflow-hidden flex flex-col bg-white">
                                <div className="bg-[#5D5FEF] p-6 text-center pattern-dots relative">
                                    <div className="absolute top-4 left-4 bg-black text-white text-[10px] font-black px-3 py-1 rounded-lg italic tracking-widest leading-none">{w.type}</div>
                                    <div className="bg-black/20 text-white text-[12px] font-bold px-4 py-1 rounded-full inline-block mb-3 leading-none">{w.ipa}</div>
                                    <h2 className="text-5xl font-black text-white mb-6 tracking-tight leading-none">{w.word}</h2>
                                    <div className="flex justify-center gap-3 mb-6">
                                        {w.syllables.map((s, i) => <div key={i} className={`syllable-bubble ${i === w.stress ? 'bg-[#FDE047]' : 'bg-white/30 text-white border-white/40'}`}>{s}</div>)}
                                    </div>
                                    <button onClick={() => speak(w.word)} className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto brutal-btn shadow-[5px_5px_0px_0px_#000]"><Icons.Volume2 size={32} /></button>
                                </div>
                                <div className="p-8 space-y-6">
                                    <div>
                                        <h3 className="font-black text-sm flex items-center gap-2 uppercase text-slate-800 mb-2 tracking-widest"><div className="w-2.5 h-2.5 bg-yellow-400 border-2 border-black rounded-full"></div> Meaning</h3>
                                        <p className="text-slate-600 font-bold text-xl border-l-4 border-slate-100 pl-4 leading-snug">{w.meaning}</p>
                                    </div>
                                    <div className="bg-emerald-50/50 p-5 rounded-2xl border-2 border-emerald-100 italic"><p className="text-base font-bold text-slate-700">"{w.s.replace('___', w.word)}"</p></div>
                                    <div className="bg-blue-50/50 p-4 rounded-xl border-2 border-blue-100"><h4 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">🔗 Word Family:</h4><p className="text-sm font-black text-slate-700">{w.family}</p></div>
                                </div>
                                <div className="p-6 pt-0 flex justify-between gap-4">
                                    <button disabled={currentWordIdx === 0} onClick={() => setCurrentWordIdx(i => i-1)} className="flex-1 py-4 brutal-btn bg-slate-100 rounded-3xl font-black text-sm">PREV</button>
                                    <button onClick={() => setCurrentWordIdx(i => (i+1)%vocabBank.length)} className="flex-1 py-4 brutal-btn bg-[#FDE047] rounded-3xl font-black text-sm uppercase">NEXT</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'coach') {
                return (
                    <div className="flex-1 flex flex-col h-full">
                        <NavHeader />
                        <div className="px-5 mt-4 mb-8 flex-1 flex flex-col justify-between animate-pop space-y-3">
                            {[
                                { m: 'speak', t: 'PRO SPEAK', d: '發音挑戰 (隨機 15 題)', c: '#86EFAC', i: <Icons.Mic size={32}/> },
                                { m: 'spell', t: 'SPELL IT', d: '聽寫挑戰 (隨機 15 題)', c: '#93C5FD', i: <Icons.Keyboard size={32}/> },
                                { m: 'fill', t: 'FILL IN', d: '搭配克漏字 (隨機 15 題)', c: '#FDBA74', i: <Icons.Pen size={32}/> }
                            ].map((b, i) => (
                                <button key={i} onClick={() => startQuiz(b.m)} className="flex-1 brutal-card-heavy p-4 flex items-center gap-6 rounded-3xl min-h-[90px]" style={{backgroundColor: b.c}}>
                                    <div className="bg-white p-4 rounded-2xl border-[3px] border-black shadow-[4px_4px_0px_0px_#000]">{b.i}</div>
                                    <div className="text-left leading-none">
                                        <div className="font-black text-2xl mb-1 text-black tracking-tighter">{b.t}</div>
                                        <div className="text-[11px] font-bold opacity-70 uppercase tracking-tight leading-none mt-1">{b.d}</div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const cur = shuffledQuiz[quizIndex];
                return (
                    <div className="flex-1 flex flex-col p-6 animate-pop h-full pb-10">
                        <div className="flex justify-between items-center mb-5">
                            <button onClick={() => setView('coach')} className="px-4 py-2 brutal-btn bg-white rounded-xl flex items-center gap-2 text-xs font-black shadow-[4px_4px_0px_0px_#000]"><Icons.RotateCcw size={16}/> EXIT</button>
                            <div className="font-black text-sm bg-black text-white px-5 py-2 rounded-full text-center tracking-tighter">{quizIndex + 1} / 15</div>
                        </div>
                        
                        <div className="brutal-card-heavy rounded-[40px] p-8 flex-1 flex flex-col justify-center items-center relative min-h-[300px] mb-8 text-center bg-white">
                            {quizMode === 'spell' && (
                                <div className="w-full">
                                    <button onClick={() => speak(cur.word)} className="w-20 h-20 bg-[#A5F3FC] rounded-full brutal-btn flex items-center justify-center mb-8 mx-auto shadow-[6px_6px_0px_0px_#000]"><Icons.Volume2 size={40}/></button>
                                    <div className="mb-8 flex justify-center items-center gap-3">
                                        <span className="bg-black text-white px-3 py-1 rounded-lg text-sm font-black uppercase italic tracking-widest">{cur.type}</span>
                                        <span className="text-slate-800 font-black text-2xl inline leading-tight">"{cur.meaning}"</span>
                                    </div>
                                    <input autoFocus className="underline-input" placeholder="Type here..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/>
                                </div>
                            )}
                            {quizMode === 'fill' && <div className="text-left w-full"><p className="text-3xl font-black leading-snug mb-8 text-slate-800">{cur.s.split('___')[0]}<span className="text-[#5D5FEF] border-b-6 border-black px-2 mx-1 italic underline underline-offset-8 leading-none">{userInput || '____'}</span>{cur.s.split('___')[1]}</p><p className="text-base text-slate-400 mb-10 italic border-l-4 pl-4 leading-relaxed font-bold tracking-tight">{cur.t}</p><input autoFocus className="underline-input" placeholder="Fill in..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/></div>}
                            {quizMode === 'speak' && <div className="w-full text-center animate-pop"><h2 className="text-7xl font-black mb-4 tracking-tighter text-slate-900 leading-none">{cur.word}</h2><div className="bg-black/5 px-6 py-2 rounded-xl text-slate-400 text-base font-black mb-10 italic tracking-tighter">{cur.ipa}</div>{recognitionText && <p className="text-blue-500 font-black text-xl animate-bounce tracking-tight">聽到: "{recognitionText}"</p>}</div>}
                            
                            {showFeedback && <div className={`absolute -bottom-8 left-1/2 -translate-x-1/2 p-6 rounded-3xl border-6 border-black font-black w-[85%] text-center text-xl shadow-[8px_8px_0px_0px_#000] z-50 animate-pop ${isCorrect ? 'bg-[#86EFAC]' : 'bg-[#FCA5A5]'}`}>{isCorrect ? '✨ CORRECT!' : (quizMode === 'speak' ? '❌ TRY AGAIN?' : `❌ ANS: ${cur.a || cur.word}`)}</div>}
                        </div>

                        {quizMode === 'speak' && (
                            <div className="flex flex-col items-center pb-6 text-center w-full">
                                {!showFeedback || isCorrect ? (
                                    <>
                                        <button onClick={handleStartRecording} className={`w-32 h-32 rounded-full brutal-btn flex items-center justify-center mb-6 transition-all ${isRecording ? 'mic-recording' : 'bg-[#FDE047] shadow-[10px_10px_0px_0px_#000]'}`}><Icons.Mic size={64} className={isRecording ? 'text-white' : 'text-black'} /></button>
                                        <div className="bg-white border-4 border-black px-10 py-3 rounded-full font-black text-sm uppercase tracking-[0.3em] shadow-[4px_4px_0px_0px_#000] mx-auto">{isRecording ? 'Listening...' : 'Tap to Record'}</div>
                                    </>
                                ) : (
                                    <div className="flex gap-4 w-full px-2 animate-pop">
                                        <button onClick={() => { setShowFeedback(false); setIsCorrect(null); setRecognitionText(''); }} className="flex-1 py-6 bg-[#FDE047] rounded-3xl brutal-btn font-black text-lg flex items-center justify-center gap-3"><Icons.RotateCcw size={24}/> TRY AGAIN</button>
                                        <button onClick={handleNext} className="flex-1 py-6 bg-white rounded-3xl brutal-btn font-black text-lg flex items-center justify-center gap-3 text-slate-500">SKIP <Icons.ArrowRight size={24}/></button>
                                    </div>
                                )}
                            </div>
                        )}
                        {!showFeedback && quizMode !== 'speak' && (
                            <button onClick={() => checkResult()} disabled={!userInput} className="w-full py-6 bg-black text-white rounded-[32px] font-black text-2xl brutal-btn shadow-[8px_8px_0px_0px_#000] mb-8 uppercase tracking-widest">CHECK ANSWER</button>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="flex-1 flex items-center justify-center p-10 text-center animate-pop h-full pb-20">
                        <div className="brutal-card-heavy w-full p-12 rounded-[60px] bg-white border-b-[15px] shadow-2xl">
                            <div className="w-28 h-28 bg-[#FDE047] rounded-[40px] border-4 border-black flex items-center justify-center mx-auto mb-8 shadow-[10px_10px_0px_0px_#000] rotate-6"><Icons.Zap size={60} /></div>
                            <h2 className="text-4xl font-black mb-4 italic uppercase tracking-tighter text-black">DONE!</h2>
                            <p className="text-slate-400 font-bold text-lg mb-10 uppercase tracking-[0.3em]">{user.name}</p>
                            <div className="text-[120px] font-black text-[#5D5FEF] mb-14 tracking-tighter leading-none text-center w-full">{Math.round((score/15)*100)}<span className="text-4xl text-slate-300 ml-2 font-black">pts</span></div>
                            <button onClick={() => setView('coach')} className="w-full py-7 bg-black text-white rounded-[40px] font-black text-2xl brutal-btn shadow-[10px_10px_0px_0px_#000] uppercase tracking-widest">BACK TO COACH</button>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
