<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabPop B2L2: My Mouth's in Airplane Mode!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: linear-gradient(180deg, #FFF9E6 0%, #FFD1D1 100%);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #root {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        .brutal-card-heavy {
            background: white;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px 0px #000;
        }

        .brutal-btn {
            border: 4px solid #000;
            box-shadow: 6px 6px 0px 0px #000;
            transition: all 0.1s ease;
            touch-action: manipulation;
        }

        .brutal-btn:active:not(:disabled) {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px 0px #000;
        }

        .brutal-input {
            border: 4px solid #000;
            border-radius: 16px;
            padding: 14px;
            outline: none;
            font-weight: 800;
            width: 100%;
            background: white;
            font-size: 20px;
        }

        .underline-input {
            border: none;
            border-bottom: 5px solid #5D5FEF;
            background: #F8FAFC;
            padding: 14px;
            width: 100%;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            outline: none;
        }

        .syllable-bubble {
            border: 3px solid #000;
            padding: 4px 14px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 16px;
        }

        .match-item {
            border: 3px solid #F9A8D4;
            background: white;
            padding: 12px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 15px;
            text-align: center;
        }

        .match-item.selected { background: #F9A8D4; color: white; transform: scale(0.95); }
        .match-item.correct { background: #86EFAC; border-color: #22C55E; color: #14532D; }

        .mic-recording {
            animation: pulse-red 1s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }

        .pattern-dots {
            background-image: radial-gradient(#00000022 1.5px, transparent 1.5px);
            background-size: 14px 14px;
        }

        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQVDLuSQnV3bYPyfStwsPUY8UQrePglY3476At9p4SCcXUcIJOZutv7-6OVPXyFVu7/exec"; 

        const Icons = {
            Zap: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="currentColor" className={p.className}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Volume2: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Book: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Coach: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Mic: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
            Keyboard: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg>,
            Pen: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/><path d="M9.5 14.5L16 8"/></svg>,
            ArrowRight: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
            RotateCcw: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Check: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={p.className}><polyline points="20 6 9 17 4 12"/></svg>,
            X: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={p.className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        const vocabList = [
            { word: "warn", type: "vt.", ipa: "/wɔːrn/", syllables: ["warn"], stress: 0, meaning: "警告；提醒", family: "warning (n.) 警告", matchPairs: [["issue a warning", "發佈警告"], ["warn of danger", "警告危險"]], fillBlank: { s: "Bill's parents ___ him not to go mountain climbing because a typhoon was coming.", a: "warned", t: "比爾的父母警告他不要去登山。" } },
            { word: "announcement", type: "n.", ipa: "/əˈnaʊns.mənt/", syllables: ["an", "nounce", "ment"], stress: 1, meaning: "公告；通知", family: "announce (v.) 宣布", matchPairs: [["make an announcement", "發表公告"], ["official announcement", "官方通知"]], fillBlank: { s: "Our English teacher made an ___ that there would be a test on Thursday.", a: "announcement", t: "我們的英文老師宣佈週四將會有一場考試。" } },
            { word: "research", type: "n.", ipa: "/ˈriː.sɜːrtʃ/", syllables: ["re", "search"], stress: 0, meaning: "研究", family: "researcher (n.) 研究人員", matchPairs: [["conduct research", "進行研究"], ["scientific research", "科學研究"]], fillBlank: { s: "Dr. Smith is doing some ___ into how dolphins communicate with each other.", a: "research", t: "史密斯博士正在研究海豚通訊。" } },
            { word: "flavor", type: "n.", ipa: "/ˈfleɪ.vər/", syllables: ["fla", "vor"], stress: 0, meaning: "味道；風味", family: "flavoring (n.) 調味", matchPairs: [["add flavor to", "增加風味"], ["artificial flavor", "人工調味"]], fillBlank: { s: "The tea that is grown in this mountain village has a gentle ___ of flowers.", a: "flavor", t: "這個山村種植的茶帶有淡淡花香。" } },
            { word: "pressure", type: "n.", ipa: "/ˈpreʃ.ər/", syllables: ["pres", "sure"], stress: 0, meaning: "壓力", family: "-", matchPairs: [["under great pressure", "壓力很大"], ["high blood pressure", "高血壓"]], fillBlank: { s: "The nurses are under great ___ to work long hours during the pandemic.", a: "pressure", t: "護理師們面臨超時工作的巨大壓力。" } },
            { word: "normally", type: "adv.", ipa: "/ˈnɔːr.mə.li/", syllables: ["nor", "mal", "ly"], stress: 0, meaning: "通常", family: "normal (adj.) 正常的", matchPairs: [["normally happen", "通常發生"], ["normal condition", "正常情況"]], fillBlank: { s: "Uncle Frank ___ reads the newspaper over breakfast, but today he watched TV.", a: "normally", t: "法蘭克叔叔通常邊吃早餐邊看報紙。" } },
            { word: "distinguish", type: "v.", ipa: "/dɪˈstɪŋ.ɡwɪʃ/", syllables: ["dis", "tin", "guish"], stress: 1, meaning: "分辨；區別", family: "-", matchPairs: [["distinguish between", "辨別差異"], ["distinguish A from B", "區別 A 與 B"]], fillBlank: { s: "Nancy and her twin sister look so similar that even their parents can't ___ between them.", a: "distinguish", t: "南西與她的雙胞胎姊妹長得太像了。" } },
            { word: "accurately", type: "adv.", ipa: "/ˈæk.jə.rət.li/", syllables: ["ac", "cu", "rate", "ly"], stress: 0, meaning: "精確地", family: "accurate (adj.) 精確的", matchPairs: [["predict accurately", "準確預測"], ["calculate accurately", "精確計算"]], fillBlank: { s: "So far scientists have not found a way to predict earthquakes ___.", a: "accurately", t: "到目前為止，科學家尚未能準確預測地震。" } },
            { word: "function", type: "v.", ipa: "/ˈfʌŋk.ʃən/", syllables: ["func", "tion"], stress: 0, meaning: "運作；功能", family: "functional (adj.) 實用的", matchPairs: [["perform a function", "發揮功能"], ["function as a bed", "充當床鋪"]], fillBlank: { s: "Malcolm's favorite couch also ___ as a bed when one of his friends stays over.", a: "functions", t: "這幅沙發在朋友留宿時也可以充當床鋪。" } },
            { word: "blame", type: "vt.", ipa: "/bleɪm/", syllables: ["blame"], stress: 0, meaning: "歸咎；責怪", family: "-", matchPairs: [["blame someone for", "因某事責怪某人"], ["be to blame", "該受責備"]], fillBlank: { s: "The police ___ the drunken driver for the terrible car accident.", a: "blamed", t: "警方將這場意外歸咎於該名酒駕司機。" } },
            { word: "affect", type: "vt.", ipa: "/əˈfekt/", syllables: ["af", "fect"], stress: 1, meaning: "影響", family: "effect (n.) 影響", matchPairs: [["seriously affect", "嚴重影響"], ["affect the outcome", "影響結果"]], fillBlank: { s: "Global warming has greatly ___ the lives of many wild animals.", a: "affected", t: "全球暖化已極大地影響了野生動物的生活。" } },
            { word: "passenger", type: "n.", ipa: "/ˈpæs.ən.dʒər/", syllables: ["pas", "sen", "ger"], stress: 0, meaning: "乘客", family: "-", matchPairs: [["bus passenger", "公車乘客"], ["passenger seat", "乘客座位"]], fillBlank: { s: "___ on the plane were glad to hear that the weather was fine.", a: "Passengers", t: "飛機上的乘客很高興聽到天氣良好。" } },
            { word: "distract", type: "vt.", ipa: "/dɪˈstrækt/", syllables: ["dis", "tract"], stress: 1, meaning: "使分心", family: "distraction (n.) 分心物", matchPairs: [["distract from", "使...分心"], ["easily distracted", "容易分心"]], fillBlank: { s: "Ken was trying to study, but the loud music from next door kept ___ him.", a: "distracting", t: "肯試著唸書，但隔壁傳來的音樂聲一直讓他分心。" } },
            { word: "indicate", type: "vt.", ipa: "/ˈɪn.dɪ.keɪt/", syllables: ["in", "di", "cate"], stress: 0, meaning: "指出；顯示", family: "indication (n.) 跡象", matchPairs: [["clearly indicate", "清楚指出"], ["indicate a change", "顯示改變"]], fillBlank: { s: "Recent research clearly ___ that only 3% of the children get enough exercise.", a: "indicates", t: "最近的研究指出，只有 3% 孩童運動足夠。" } },
            { word: "solution", type: "n.", ipa: "/səˈluː.ʃən/", syllables: ["so", "lu", "tion"], stress: 1, meaning: "解決方法", family: "solve (v.) 解決", matchPairs: [["find a solution", "尋找對策"], ["solution to the problem", "問題解法"]], fillBlank: { s: "The government is trying to think of a ___ to the problem of air pollution.", a: "solution", t: "政府正試圖想出解決空氣污染的方法。" } }
        ];

        const MiniMatch = ({ pairs, onWordSpeak }) => {
            const [selected, setSelected] = useState(null);
            const [completed, setCompleted] = useState([]);
            const items = useMemo(() => {
                const flat = [];
                pairs.forEach((p, idx) => {
                    flat.push({ id: `en-${idx}`, text: p[0], pair: idx, side: 'en' });
                    flat.push({ id: `zh-${idx}`, text: p[1], pair: idx, side: 'zh' });
                });
                return flat.sort(() => Math.random() - 0.5);
            }, [pairs]);

            const handleClick = (item) => {
                if (completed.includes(item.pair)) return;
                if (!selected) setSelected(item);
                else if (selected.id !== item.id && selected.side !== item.side && selected.pair === item.pair) {
                    setCompleted([...completed, item.pair]);
                    setSelected(null);
                    onWordSpeak(pairs[item.pair][0]);
                } else setSelected(item);
            };

            return (
                <div className="bg-[#FFF0F5] border-2 border-[#F9A8D4] rounded-xl p-3 animate-pop shadow-sm">
                    <div className="flex items-center gap-1.5 mb-1.5">
                        <span className="text-pink-500 text-sm">✨</span>
                        <span className="font-black text-[11px] uppercase tracking-widest text-pink-400 italic">Mini Match</span>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        {items.map(it => (
                            <button key={it.id} onClick={() => handleClick(it)}
                                className={`match-item ${selected?.id === it.id ? 'selected' : ''} ${completed.includes(it.pair) ? 'correct' : ''}`}>
                                {it.text}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState({ name: '', class: '', no: '', xp: 0 });
            const [currentWordIdx, setCurrentWordIdx] = useState(0);
            const [quizMode, setQuizMode] = useState(null); 
            const [shuffledQuiz, setShuffledQuiz] = useState([]);
            const [quizIndex, setQuizIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [score, setScore] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [recognitionText, setRecognitionText] = useState('');
            const [submitting, setSubmitting] = useState(false);

            const speak = (text) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.85;
                window.speechSynthesis.speak(u);
            };

            const startQuiz = (mode) => {
                const q = [...vocabList].sort(() => Math.random() - 0.5).slice(0, 15);
                setShuffledQuiz(q);
                setQuizMode(mode);
                setQuizIndex(0);
                setScore(0);
                setUserInput('');
                setShowFeedback(false);
                setRecognitionText('');
                setView('quiz');
            };

            const checkResult = (resultIsCorrect = null) => {
                const cur = shuffledQuiz[quizIndex];
                let ok = resultIsCorrect;
                
                if (ok === null) {
                    if(quizMode === 'spell') ok = userInput.trim().toLowerCase() === cur.word.toLowerCase();
                    if(quizMode === 'fill') ok = userInput.trim().toLowerCase() === cur.fillBlank.a.toLowerCase();
                }

                setIsCorrect(ok);
                setShowFeedback(true);
                
                if (ok || quizMode !== 'speak') {
                    if(ok) setScore(s => s + 1);
                    setTimeout(() => {
                        handleNext();
                    }, 1500);
                }
            };

            const handleNext = () => {
                if(quizIndex < shuffledQuiz.length - 1) {
                    setQuizIndex(i => i + 1);
                    setUserInput('');
                    setRecognitionText('');
                    setShowFeedback(false);
                    setIsCorrect(null);
                } else {
                    handleSubmitScore();
                }
            };

            const handleTryAgain = () => {
                setShowFeedback(false);
                setIsCorrect(null);
                setRecognitionText('');
            };

            const handleSubmitScore = async () => {
                setView('result');
                const finalPerc = Math.round((score / 15) * 100);
                if (GOOGLE_SCRIPT_URL) {
                    setSubmitting(true);
                    try {
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: user.name, class: user.class, no: user.no, score: finalPerc })
                        });
                    } catch (e) {}
                    setSubmitting(false);
                }
            };

            const handleStartRecording = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("瀏覽器不支援語音辨識。請使用 Chrome 或 iOS Safari。");
                    return;
                }
                
                // 停止現有的辨識
                if (isRecording) return;

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onstart = () => {
                    setIsRecording(true);
                    setRecognitionText('');
                };

                recognition.onresult = (e) => {
                    const speech = e.results[0][0].transcript.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                    const target = shuffledQuiz[quizIndex].word.toLowerCase();
                    setRecognitionText(speech);
                    const ok = (speech.includes(target) || target.includes(speech));
                    checkResult(ok);
                };

                recognition.onerror = (err) => {
                    console.error("SpeechRecognition Error", err.error);
                    setIsRecording(false);
                    if (err.error === 'no-speech') {
                        alert("沒聽到聲音，請再試一次！");
                    } else if (err.error === 'not-allowed') {
                        alert("請允許開啟麥克風權限！");
                    } else {
                        alert("錄音失敗，請重試。");
                    }
                };

                recognition.onend = () => {
                    setIsRecording(false);
                };

                try {
                    recognition.start();
                } catch (e) {
                    setIsRecording(false);
                }
            };

            if (view === 'login') {
                return (
                    <div className="flex-1 flex items-center justify-center p-6">
                        <div className="brutal-card-heavy w-full p-10 rounded-[40px] text-center bg-white shadow-xl">
                            <div className="w-20 h-20 bg-[#FDE047] rounded-full border-4 border-black flex items-center justify-center mx-auto mb-6 shadow-[6px_6px_0px_0px_#000]"><Icons.Zap size={40} /></div>
                            <h1 className="text-4xl font-black italic tracking-tighter mb-2"><span className="text-[#5D5FEF]">VOCAB</span><span className="text-[#D946EF]">POP</span></h1>
                            <p className="text-slate-400 font-bold text-sm mb-10 tracking-[0.2em] uppercase">Student Login</p>
                            <form className="space-y-6 text-left" onSubmit={e => { e.preventDefault(); if(user.name&&user.class&&user.no) setView('learn'); }}>
                                <div className="flex gap-4">
                                    <div className="flex-1">
                                        <label className="block font-black mb-2 text-[14px] uppercase text-slate-500">Class *</label>
                                        <input className="brutal-input" placeholder="104" value={user.class} onChange={e => setUser({...user, class: e.target.value})} required />
                                    </div>
                                    <div className="flex-1">
                                        <label className="block font-black mb-2 text-[14px] uppercase text-slate-500">No. *</label>
                                        <input className="brutal-input" placeholder="15" value={user.no} onChange={e => setUser({...user, no: e.target.value})} required />
                                    </div>
                                </div>
                                <div><label className="block font-black mb-2 text-[14px] uppercase text-slate-500">Name *</label><input className="brutal-input" placeholder="姓名" value={user.name} onChange={e => setUser({...user, name: e.target.value})} required /></div>
                                <button type="submit" className="w-full py-5 bg-[#5D5FEF] text-white rounded-2xl font-black text-xl brutal-btn flex items-center justify-center gap-3 mt-4">START JOURNEY <Icons.ArrowRight size={24} /></button>
                            </form>
                        </div>
                    </div>
                );
            }

            const NavHeader = () => (
                <div className="w-full px-5 pt-4 pb-1 sticky top-0 z-50">
                    <div className="brutal-card bg-white rounded-3xl p-3 flex justify-between items-center shadow-[6px_6px_0px_0px_#000]">
                        <div className="flex items-center gap-3">
                            <Icons.Zap size={24} className="text-yellow-400 fill-current" />
                            <div className="flex flex-col"><span className="font-black text-lg italic leading-none"><span className="text-[#5D5FEF]">VOCAB</span> <span className="text-[#D946EF]">POP</span></span><span className="text-[11px] text-slate-400 font-bold uppercase mt-1 leading-none">{user.class}班 {user.no}號 {user.name}</span></div>
                        </div>
                        <div className="bg-black text-white rounded-full px-4 py-1.5 flex items-center gap-2 text-xs font-black"><span className="text-yellow-400">★ LV.1</span><span className="text-slate-500">|</span><span>{user.xp} XP</span></div>
                    </div>
                    <div className="flex gap-3 mt-3 px-1">
                        <button onClick={() => setView('learn')} className={`flex-1 py-3 brutal-btn rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all ${view === 'learn' ? 'bg-[#A5F3FC] translate-y-0.5 shadow-none' : 'bg-white'}`}><Icons.Book size={18} /> LEARN</button>
                        <button onClick={() => setView('coach')} className={`flex-1 py-3 brutal-btn rounded-xl font-black text-sm flex items-center justify-center gap-2 transition-all ${view === 'coach' ? 'bg-[#F9A8D4] translate-y-0.5 shadow-none' : 'bg-white'}`}><Icons.Coach size={18} /> COACH</button>
                    </div>
                </div>
            );

            if (view === 'learn') {
                const w = vocabList[currentWordIdx];
                return (
                    <div className="flex-1 flex flex-col pb-6">
                        <NavHeader />
                        <div className="px-5 mt-2 animate-pop">
                            <div className="brutal-card-heavy rounded-[40px] overflow-hidden">
                                <div className="bg-[#5D5FEF] p-5 text-center pattern-dots relative">
                                    <div className="absolute top-4 left-4 bg-black text-white text-[11px] font-black px-3 py-1 rounded-lg">{w.type}</div>
                                    <div className="bg-black/20 text-white text-[14px] font-bold px-4 py-1 rounded-full inline-block mb-2 tracking-widest">{w.ipa}</div>
                                    <h2 className="text-5xl font-black text-white mb-6 tracking-tight leading-none">{w.word}</h2>
                                    <div className="flex justify-center gap-3 mb-8">{w.syllables.map((s, i) => <div key={i} className={`syllable-bubble ${i === w.stress ? 'bg-[#FDE047]' : 'bg-white/30 text-white border-white/40'}`}>{s}</div>)}</div>
                                    <button onClick={() => speak(w.word)} className="w-14 h-14 bg-white rounded-full flex items-center justify-center mx-auto brutal-btn shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"><Icons.Volume2 size={32} /></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <h3 className="font-black text-[14px] flex items-center gap-2 uppercase tracking-widest mb-1 text-slate-800"><div className="w-2.5 h-2.5 bg-yellow-400 border-2 border-black rounded-full"></div> Meaning</h3>
                                        <p className="text-slate-600 font-bold text-xl leading-snug border-l-4 border-slate-100 pl-4 py-0.5">{w.meaning}</p>
                                    </div>
                                    <div className="bg-emerald-50/50 p-4 rounded-2xl border-2 border-emerald-200"><p className="text-sm font-bold text-slate-700 italic leading-snug">"{w.fillBlank.s.replace('___', w.word)}"</p></div>
                                    <MiniMatch key={w.word} pairs={w.matchPairs} onWordSpeak={speak} />
                                    <div className="flex justify-between items-center pt-2">
                                        <button disabled={currentWordIdx === 0} onClick={() => setCurrentWordIdx(i => i-1)} className="px-6 py-4 brutal-btn bg-slate-100 rounded-2xl font-black text-sm">PREV</button>
                                        <button onClick={() => setCurrentWordIdx(i => (i+1)%vocabList.length)} className="px-10 py-4 brutal-btn bg-[#FDE047] rounded-2xl font-black text-sm">NEXT</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'coach') {
                return (
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <NavHeader />
                        <div className="px-5 mt-4 mb-10 space-y-4 flex-1 flex flex-col justify-between animate-pop">
                            {[
                                { m: 'speak', t: 'PRO SPEAK', d: '發音挑戰 (隨機 15 題)', c: '#86EFAC', i: <Icons.Mic size={40}/> },
                                { m: 'spell', t: 'SPELL IT', d: '聽寫挑戰 (15 題)', c: '#93C5FD', i: <Icons.Keyboard size={40}/> },
                                { m: 'fill', t: 'FILL IN', d: '例句克漏字 (15 題)', c: '#FDBA74', i: <Icons.Pen size={40}/> }
                            ].map((b, i) => (
                                <button key={i} onClick={() => startQuiz(b.m)} className="flex-1 brutal-card-heavy p-6 flex items-center gap-6 rounded-[32px] min-h-[100px]" style={{backgroundColor: b.c}}>
                                    <div className="bg-white p-4 rounded-2xl border-[3px] border-black shadow-[4px_4px_0px_0px_#000]">{b.i}</div>
                                    <div className="text-left leading-tight"><div className="font-black text-2xl mb-1">{b.t}</div><div className="text-[12px] font-bold opacity-70 uppercase tracking-tight">{b.d}</div></div>
                                    <Icons.ArrowRight size={28} className="ml-auto opacity-30" />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const cur = shuffledQuiz[quizIndex];
                return (
                    <div className="flex-1 flex flex-col p-6 animate-pop overflow-hidden">
                        <div className="flex justify-between items-center mb-4">
                            <button onClick={() => setView('coach')} className="px-4 py-2 brutal-btn bg-white rounded-xl flex items-center gap-2 text-xs font-black shadow-[4px_4px_0px_0px_#000]"><Icons.RotateCcw size={18}/> EXIT</button>
                            <div className="font-black text-sm bg-black text-white px-5 py-2 rounded-full tracking-widest">{quizIndex + 1} / {shuffledQuiz.length}</div>
                        </div>
                        <div className="brutal-card-heavy rounded-[40px] p-8 flex-1 flex flex-col justify-center items-center relative min-h-[320px] mb-8">
                            {quizMode === 'spell' && <div className="w-full text-center"><button onClick={() => speak(cur.word)} className="w-20 h-20 bg-[#A5F3FC] rounded-full brutal-btn flex items-center justify-center mb-10 mx-auto shadow-[6px_6px_0px_0px_#000]"><Icons.Volume2 size={40}/></button><p className="text-slate-800 font-bold text-xl leading-relaxed mb-10 px-4 font-black">"{cur.meaning}"</p><input autoFocus className="underline-input" placeholder="Type here..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/></div>}
                            {quizMode === 'fill' && <div className="text-left w-full"><p className="text-2xl font-black leading-relaxed mb-8 px-2 text-slate-800">{cur.fillBlank.s.split('___')[0]}<span className="text-[#5D5FEF] border-b-4 border-black px-1 mx-1 underline underline-offset-8">{userInput || '____'}</span>{cur.fillBlank.s.split('___')[1]}</p><p className="text-sm text-slate-400 mb-10 italic border-l-4 pl-4 leading-relaxed font-bold">{cur.fillBlank.t}</p><input autoFocus className="underline-input" placeholder="Fill in..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/></div>}
                            {quizMode === 'speak' && <div className="w-full text-center animate-pop"><h2 className="text-6xl font-black mb-4 tracking-tighter text-slate-900 leading-none">{cur.word}</h2><div className="bg-black/5 px-6 py-2 rounded-xl text-slate-400 text-sm font-black mb-10 italic tracking-widest">{cur.ipa}</div><div className="flex gap-3 justify-center mb-10">{cur.syllables.map((s, i) => <div key={i} className={`syllable-bubble border-[4px] ${i === cur.stress ? 'bg-[#FDE047]' : 'bg-white'}`}>{s}</div>)}</div>{recognitionText && <p className="text-blue-500 font-black text-lg animate-bounce tracking-tight">聽到: "{recognitionText}"</p>}</div>}
                            
                            {showFeedback && <div className={`absolute -bottom-6 left-1/2 -translate-x-1/2 p-6 rounded-2xl border-[4px] border-black font-black w-[85%] text-center text-lg shadow-[8px_8px_0px_0px_#000] z-20 ${isCorrect ? 'bg-[#86EFAC]' : 'bg-[#FCA5A5]'}`}>{isCorrect ? '✨ CORRECT!' : (quizMode === 'speak' ? '❌ TRY AGAIN?' : `❌ ANS: ${quizMode === 'spell' ? cur.word : cur.fillBlank.a}`)}</div>}
                        </div>
                        {quizMode === 'speak' && (
                            <div className="flex flex-col items-center pb-12">
                                {!showFeedback || isCorrect ? (
                                    <>
                                        <button onClick={handleStartRecording} className={`w-28 h-28 rounded-full brutal-btn flex items-center justify-center mb-6 transition-all ${isRecording ? 'mic-recording bg-red-500' : 'bg-[#FDE047] shadow-[6px_6px_0px_0px_#000]'}`}><Icons.Mic size={54} className={isRecording ? 'text-white' : ''} /></button>
                                        <div className="bg-white border-4 border-black px-10 py-3 rounded-full font-black text-sm uppercase tracking-[0.3em] shadow-[4px_4px_0px_0px_#000]">{isRecording ? 'Listening...' : 'Tap to Record'}</div>
                                    </>
                                ) : (
                                    <div className="flex gap-4 w-full px-2 animate-pop">
                                        <button onClick={handleTryAgain} className="flex-1 py-5 bg-[#FDE047] rounded-2xl brutal-btn font-black text-xl flex items-center justify-center gap-3"><Icons.RotateCcw size={22}/> TRY AGAIN</button>
                                        <button onClick={handleNext} className="flex-1 py-5 bg-white rounded-2xl brutal-btn font-black text-xl flex items-center justify-center gap-3 text-slate-500">SKIP <Icons.ArrowRight size={22}/></button>
                                    </div>
                                )}
                            </div>
                        )}
                        {!showFeedback && quizMode !== 'speak' && (
                            <button onClick={() => checkResult()} disabled={!userInput} className="w-full py-5 bg-black text-white rounded-2xl font-black text-xl brutal-btn shadow-[8px_8px_0px_0px_#000] mb-10 disabled:opacity-40 uppercase tracking-widest">CHECK ANSWER</button>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="flex-1 flex items-center justify-center p-10 text-center animate-pop">
                        <div className="brutal-card-heavy w-full p-12 rounded-[50px] bg-white border-b-[12px] shadow-2xl">
                            <div className="w-24 h-24 bg-[#FDE047] rounded-3xl border-4 border-black flex items-center justify-center mx-auto mb-8 rotate-6 shadow-[10px_10px_0px_0px_#000]"><Icons.Zap size={54} /></div>
                            <h2 className="text-3xl font-black mb-2 italic uppercase tracking-tighter">Challenge Done!</h2>
                            <p className="text-slate-400 font-bold text-xs mb-10 uppercase tracking-widest">{user.name}'s SCORE</p>
                            <div className="text-[120px] font-black text-[#5D5FEF] mb-14 tracking-tighter leading-none">{Math.round((score/15)*100)}<span className="text-3xl text-slate-300 ml-2 font-black">pts</span></div>
                            {submitting ? <p className="text-slate-400 font-black animate-pulse mb-8 tracking-widest">SAVING SCORE...</p> : <button onClick={() => setView('coach')} className="w-full py-6 bg-black text-white rounded-[32px] font-black text-2xl brutal-btn shadow-[10px_10px_0px_0px_#000] uppercase tracking-widest">BACK TO COACH</button>}
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
