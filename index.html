<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabPop B2L2: My Mouth's in Airplane Mode!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: linear-gradient(180deg, #FFF9E6 0%, #FFD1D1 100%);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #root {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        .brutal-card-heavy {
            background: white;
            border: 5px solid #000;
            box-shadow: 12px 12px 0px 0px #000;
        }

        .brutal-btn {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px 0px #000;
            transition: all 0.1s ease;
            touch-action: manipulation;
        }

        .brutal-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px 0px #000;
        }

        .brutal-input {
            border: 4px solid #000;
            border-radius: 18px;
            padding: 16px;
            outline: none;
            font-weight: 800;
            width: 100%;
            background: white;
            font-size: 24px;
        }

        .underline-input {
            border: none;
            border-bottom: 6px solid #5D5FEF;
            background: #F8FAFC;
            padding: 16px;
            width: 100%;
            font-size: 34px;
            font-weight: 900;
            text-align: center;
            outline: none;
        }

        .syllable-bubble {
            border: 3px solid #000;
            padding: 6px 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 18px;
        }

        .mic-recording {
            animation: pulse-red 0.8s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.6); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }

        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpEFJFVCj2O2YoG94xRfKGEM1RI_Yvcr_ATyrOS1L2dJnYHhjnc-9ZGhuC2ErVuuGu/exec"; 

        const Icons = {
            Zap: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="currentColor" className={p.className}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Volume2: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Book: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Coach: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Mic: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
            Keyboard: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg>,
            Pen: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/><path d="M9.5 14.5L16 8"/></svg>,
            ArrowRight: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
            RotateCcw: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        };

        // 題庫擴充：包含 Word Family 與例句
        const vocabList = [
            { word: "warn", type: "vt.", meaning: "警告", s: "Bill's parents ___ him not to go mountain climbing.", a: "warned", t: "比爾的父母警告他不要去登山。" },
            { word: "warning", type: "n.", meaning: "警告", s: "The government issued a ___ about the typhoon.", a: "warning", t: "政府發布了關於颱風的警告。" },
            { word: "announcement", type: "n.", meaning: "公告", s: "Our English teacher made an ___ that there would be a test.", a: "announcement", t: "老師宣布週四將有一場考試。" },
            { word: "announce", type: "vt.", meaning: "宣佈", s: "The principal ___ that the sports day was postponed.", a: "announced", t: "校長宣佈運動會延期了。" },
            { word: "research", type: "n.", meaning: "研究", s: "Dr. Smith is doing some ___ into dolphin communication.", a: "research", t: "史密斯博士正在研究海豚通訊。" },
            { word: "researcher", type: "n.", meaning: "研究人員", s: "A team of ___ is studying the new disease.", a: "researchers", t: "一組研究人員正在研究這種新疾病。" },
            { word: "flavor", type: "n.", meaning: "味道", s: "This mountain tea has a gentle ___ of flowers.", a: "flavor", t: "這種山茶帶有淡淡花香。" },
            { word: "flavoring", type: "n.", meaning: "調味料", s: "The cook added some lemon ___ to the cake.", a: "flavoring", t: "廚師在蛋糕裡加了一些檸檬香料。" },
            { word: "pressure", type: "n.", meaning: "壓力", s: "The nurses are under great ___ to work long hours.", a: "pressure", t: "護理師們面臨超時工作的巨大壓力。" },
            { word: "normally", type: "adv.", meaning: "通常", s: "Uncle Frank ___ reads the newspaper over breakfast.", a: "normally", t: "法蘭克叔叔通常邊吃早餐邊看報紙。" },
            { word: "normal", type: "adj.", meaning: "正常的", s: "It's ___ to feel nervous before a big exam.", a: "normal", t: "在大考前感到緊張是正常的。" },
            { word: "distinguish", type: "v.", meaning: "分辨", s: "Even their parents can't ___ between the twins.", a: "distinguish", t: "甚至連父母都分不出這對雙胞胎。" },
            { word: "accurately", type: "adv.", meaning: "精確地", s: "So far scientists cannot predict earthquakes ___.", a: "accurately", t: "到目前為止，科學家尚未能準確預測地震。" },
            { word: "accurate", type: "adj.", meaning: "精確的", s: "The weather report wasn't very ___ today.", a: "accurate", t: "今天的氣象預報不是很準確。" },
            { word: "function", type: "v.", meaning: "運作", s: "This couch also ___ as a guest bed.", a: "functions", t: "這幅沙發也可以充當客房床鋪。" },
            { word: "functional", type: "adj.", meaning: "實用的", s: "This furniture is simple but very ___.", a: "functional", t: "這件家具簡單但非常實用。" },
            { word: "blame", type: "vt.", meaning: "歸咎", s: "The police ___ the driver for the terrible accident.", a: "blamed", t: "警方將這場意外歸咎於司機。" },
            { word: "affect", type: "vt.", meaning: "影響", s: "Global warming has greatly ___ the wild animals.", a: "affected", t: "全球暖化已極大地影響了野生動物。" },
            { word: "passenger", type: "n.", meaning: "乘客", s: "The ___ on the plane were glad to hear the good news.", a: "passengers", t: "飛機上的乘客很高興聽到好消息。" },
            { word: "distract", type: "vt.", meaning: "使分心", s: "The loud music from next door kept ___ Ken.", a: "distracting", t: "隔壁傳來的音樂聲一直讓肯分心。" },
            { word: "distraction", type: "n.", meaning: "分心物", s: "Turn off your phone to avoid ___ during study.", a: "distractions", t: "關掉手機以避免在讀書時分心。" },
            { word: "indicate", type: "vt.", meaning: "指出", s: "Recent research clearly ___ that exercise is important.", a: "indicates", t: "最近的研究指出運動很重要。" },
            { word: "indication", type: "n.", meaning: "跡象", s: "A dark cloud is usually an ___ of rain.", a: "indication", t: "烏雲通常是下雨的跡象。" },
            { word: "solution", type: "n.", meaning: "解決方法", s: "The government is trying to think of a ___ to pollution.", a: "solution", t: "政府正試圖想出解決污染的方法。" },
            { word: "solve", type: "vt.", meaning: "解決", s: "Can you help me ___ this difficult math problem?", a: "solve", t: "你能幫我解決這道難的數學題嗎？" },
            { word: "ingredient", type: "n.", meaning: "成分", s: "This dish only uses natural ___ like vegetables.", a: "ingredients", t: "這道菜只使用天然成分，如蔬菜。" },
            { word: "recipe", type: "n.", meaning: "食譜", s: "Does this cookbook include a ___ for apple pie?", a: "recipe", t: "這本食譜書有包含蘋果派的作法嗎？" },
            { word: "comparison", type: "n.", meaning: "比較", s: "By ___, life in any other city costs much less.", a: "comparison", t: "相較之下，住在其他城市花費少很多。" },
            { word: "compare", type: "vt.", meaning: "比較", s: "Don't ___ yourself with other people.", a: "compare", t: "不要拿自己跟別人比較。" },
            { word: "remain", type: "vi.", meaning: "保持", s: "When Judy went back, she found things ___ unchanged.", a: "remained", t: "當朱蒂回去時，她發現事物保持不變。" },
            { word: "provide", type: "vt.", meaning: "提供", s: "This hotel ___ a nice breakfast and free Wi-Fi.", a: "provides", t: "這家飯店提供美味早餐與免費 Wi-Fi。" },
            { word: "provision", type: "n.", meaning: "提供", s: "The ___ of food is essential during an emergency.", a: "provision", t: "緊急情況下提供食物是必要的。" }
        ];

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState({ name: '', class: '', no: '', xp: 0 });
            const [quizMode, setQuizMode] = useState(null); 
            const [shuffledQuiz, setShuffledQuiz] = useState([]);
            const [quizIndex, setQuizIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [score, setScore] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [recognitionText, setRecognitionText] = useState('');
            const [submitting, setSubmitting] = useState(false);

            const recognitionRef = useRef(null);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.85;
                window.speechSynthesis.speak(u);
            };

            const startQuiz = (mode) => {
                // ✨ 抽選 15 題
                const q = [...vocabList].sort(() => Math.random() - 0.5).slice(0, 15);
                setShuffledQuiz(q);
                setQuizMode(mode);
                setQuizIndex(0);
                setScore(0);
                setUserInput('');
                setShowFeedback(false);
                setRecognitionText('');
                setView('quiz');
            };

            const checkResult = (resultIsCorrect = null) => {
                const cur = shuffledQuiz[quizIndex];
                let ok = resultIsCorrect;
                
                if (ok === null) {
                    if(quizMode === 'spell') ok = userInput.trim().toLowerCase() === cur.word.toLowerCase();
                    if(quizMode === 'fill') ok = userInput.trim().toLowerCase() === cur.a.toLowerCase();
                }

                setIsCorrect(ok);
                setShowFeedback(true);
                
                if (ok || quizMode !== 'speak') {
                    if(ok) setScore(s => s + 1);
                    setTimeout(handleNext, 1500);
                }
            };

            const handleNext = () => {
                if(quizIndex < shuffledQuiz.length - 1) {
                    setQuizIndex(i => i + 1);
                    setUserInput('');
                    setRecognitionText('');
                    setShowFeedback(false);
                    setIsCorrect(null);
                } else handleSubmitScore();
            };

            const handleTryAgain = () => {
                setShowFeedback(false);
                setIsCorrect(null);
                setRecognitionText('');
            };

            const handleSubmitScore = async () => {
                setView('result');
                const finalPerc = Math.round((score / 15) * 100);
                if (GOOGLE_SCRIPT_URL) {
                    setSubmitting(true);
                    try {
                        // ✨ 傳送：班級, 座號, 姓名, 題型, 分數
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                class: user.class, 
                                no: user.no, 
                                name: user.name, 
                                mode: quizMode.toUpperCase(), 
                                score: finalPerc 
                            })
                        });
                    } catch (e) {}
                    setSubmitting(false);
                }
            };

            const handleStartRecording = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("手機瀏覽器不支援語音辨識。請使用 Safari 或 Chrome。");
                    return;
                }

                if (isRecording) {
                    recognitionRef.current?.abort();
                    setIsRecording(false);
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognitionRef.current = recognition;

                recognition.onstart = () => { setIsRecording(true); setRecognitionText(''); };
                recognition.onresult = (e) => {
                    const speech = e.results[0][0].transcript.toLowerCase().trim().replace(/[.,!?;:]/g, "");
                    const target = shuffledQuiz[quizIndex].word.toLowerCase();
                    setRecognitionText(speech);
                    checkResult(speech === target || speech.includes(target) || target.includes(speech));
                };
                recognition.onerror = () => setIsRecording(false);
                recognition.onend = () => setIsRecording(false);
                recognition.start();
            };

            if (view === 'login') {
                return (
                    <div className="flex-1 flex items-center justify-center p-8">
                        <div className="brutal-card-heavy w-full p-10 rounded-[45px] text-center bg-white shadow-2xl">
                            <div className="w-24 h-24 bg-[#FDE047] rounded-full border-4 border-black flex items-center justify-center mx-auto mb-8 shadow-[8px_8px_0px_0px_#000]"><Icons.Zap size={48} /></div>
                            <h1 className="text-5xl font-black italic tracking-tighter mb-4 leading-none"><span className="text-[#5D5FEF]">VOCAB</span><br/><span className="text-[#D946EF]">POP</span></h1>
                            <p className="text-slate-400 font-bold text-base mb-12 tracking-[0.2em] uppercase text-center">Student Login</p>
                            <form className="space-y-6 text-left" onSubmit={e => { e.preventDefault(); if(user.name&&user.class&&user.no) setView('coach'); }}>
                                <div className="flex gap-4">
                                    <div className="flex-1"><label className="block font-black mb-2 text-sm text-slate-500 uppercase">Class *</label><input className="brutal-input" placeholder="104" value={user.class} onChange={e => setUser({...user, class: e.target.value})} required /></div>
                                    <div className="flex-1"><label className="block font-black mb-2 text-sm text-slate-500 uppercase">No. *</label><input className="brutal-input" placeholder="15" value={user.no} onChange={e => setUser({...user, no: e.target.value})} required /></div>
                                </div>
                                <div><label className="block font-black mb-2 text-sm text-slate-500 uppercase">Name *</label><input className="brutal-input" placeholder="王小明" value={user.name} onChange={e => setUser({...user, name: e.target.value})} required /></div>
                                <button type="submit" className="w-full py-6 bg-[#5D5FEF] text-white rounded-3xl font-black text-2xl brutal-btn flex items-center justify-center gap-3 mt-4">START <Icons.ArrowRight size={28} /></button>
                            </form>
                        </div>
                    </div>
                );
            }

            const NavHeader = () => (
                <div className="w-full px-6 pt-6 pb-2 sticky top-0 z-50">
                    <div className="brutal-card bg-white rounded-[28px] p-4 flex justify-between items-center shadow-[8px_8px_0px_0px_#000]">
                        <div className="flex items-center gap-4">
                            <Icons.Zap size={28} className="text-yellow-400 fill-current" />
                            <div className="flex flex-col"><span className="font-black text-xl italic leading-none text-slate-800 tracking-tighter">VOCABPOP</span><span className="text-[12px] text-slate-400 font-bold uppercase mt-1 leading-none">{user.class}-{user.no} {user.name}</span></div>
                        </div>
                        <div className="bg-black text-white rounded-full px-5 py-2 flex items-center gap-2 text-sm font-black tracking-tighter">LV.1</div>
                    </div>
                </div>
            );

            if (view === 'coach') {
                return (
                    <div className="flex-1 flex flex-col h-full overflow-hidden">
                        <NavHeader />
                        <div className="px-6 mt-6 mb-12 flex-1 flex flex-col justify-between animate-pop">
                            {[
                                { m: 'speak', t: 'PRO SPEAK', d: '發音挑戰 (隨機 15 題)', c: '#86EFAC', i: <Icons.Mic size={45}/> },
                                { m: 'spell', t: 'SPELL IT', d: '聽寫挑戰 (15 題)', c: '#93C5FD', i: <Icons.Keyboard size={45}/> },
                                { m: 'fill', t: 'FILL IN', d: '例句客漏字 (15 題)', c: '#FDBA74', i: <Icons.Pen size={45}/> }
                            ].map((b, i) => (
                                <button key={i} onClick={() => startQuiz(b.m)} className="flex-1 brutal-card-heavy p-6 flex items-center gap-8 rounded-[40px] min-h-[110px]" style={{backgroundColor: b.c}}>
                                    <div className="bg-white p-5 rounded-3xl border-4 border-black shadow-[6px_6px_0px_0px_#000]">{b.i}</div>
                                    <div className="text-left"><div className="font-black text-3xl mb-1 text-black tracking-tight leading-none">{b.t}</div><div className="text-sm font-bold opacity-70 uppercase tracking-tight leading-none mt-1">{b.d}</div></div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const cur = shuffledQuiz[quizIndex];
                return (
                    <div className="flex-1 flex flex-col p-6 animate-pop overflow-hidden h-full">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('coach')} className="px-5 py-3 brutal-btn bg-white rounded-2xl flex items-center gap-2 text-sm font-black shadow-[6px_6px_0px_0px_#000]"><Icons.RotateCcw size={20}/> EXIT</button>
                            <div className="font-black text-lg bg-black text-white px-6 py-2 rounded-full text-center tracking-tighter">{quizIndex + 1} / {shuffledQuiz.length}</div>
                        </div>
                        
                        <div className="brutal-card-heavy rounded-[45px] p-8 flex-1 flex flex-col justify-center items-center relative min-h-[350px] mb-10 text-center">
                            {quizMode === 'spell' && (
                                <div className="w-full">
                                    <button onClick={() => speak(cur.word)} className="w-24 h-24 bg-[#A5F3FC] rounded-full brutal-btn flex items-center justify-center mb-10 mx-auto shadow-[8px_8px_0px_0px_#000]"><Icons.Volume2 size={48}/></button>
                                    <div className="mb-8 space-x-3 flex justify-center items-center">
                                        <span className="bg-black text-white px-4 py-2 rounded-xl text-xl font-black uppercase italic">{cur.type}</span>
                                        <span className="text-slate-800 font-black text-4xl inline">"{cur.meaning}"</span>
                                    </div>
                                    <input autoFocus className="underline-input" placeholder="Type..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/>
                                </div>
                            )}
                            {quizMode === 'fill' && <div className="text-left w-full"><p className="text-4xl font-black leading-snug mb-10 text-slate-800">{cur.s.split('___')[0]}<span className="text-[#5D5FEF] border-b-6 border-black px-2 mx-1">{userInput || '____'}</span>{cur.s.split('___')[1]}</p><p className="text-xl text-slate-400 mb-10 italic border-l-6 pl-4 leading-relaxed font-bold tracking-tight">{cur.t}</p><input autoFocus className="underline-input" placeholder="Fill answer..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/></div>}
                            {quizMode === 'speak' && <div className="w-full text-center animate-pop"><h2 className="text-8xl font-black mb-4 tracking-tighter text-slate-900 leading-none">{cur.word}</h2><div className="bg-black/5 px-8 py-3 rounded-2xl text-slate-400 text-xl font-black mb-12 italic tracking-tighter">{cur.word.length} letters</div>{recognitionText && <p className="text-blue-500 font-black text-xl animate-bounce">Hear: "{recognitionText}"</p>}</div>}
                            
                            {showFeedback && <div className={`absolute -bottom-10 left-1/2 -translate-x-1/2 p-8 rounded-3xl border-6 border-black font-black w-[90%] text-center text-3xl shadow-[10px_10px_0px_0px_#000] z-50 animate-pop ${isCorrect ? 'bg-[#86EFAC]' : 'bg-[#FCA5A5]'}`}>{isCorrect ? '✨ CORRECT!' : (quizMode === 'speak' ? '❌ TRY AGAIN?' : `❌ ANS: ${quizMode === 'spell' ? cur.word : cur.a}`)}</div>}
                        </div>

                        {quizMode === 'speak' && (
                            <div className="flex flex-col items-center pb-12 text-center w-full">
                                {!showFeedback || isCorrect ? (
                                    <>
                                        <button onClick={handleStartRecording} className={`w-36 h-36 rounded-full brutal-btn flex items-center justify-center mb-8 transition-all ${isRecording ? 'mic-recording' : 'bg-[#FDE047] shadow-[10px_10px_0px_0px_#000]'}`}><Icons.Mic size={72} className={isRecording ? 'text-white' : 'text-black'} /></button>
                                        <div className="bg-white border-4 border-black px-12 py-4 rounded-full font-black text-xl uppercase tracking-[0.3em] shadow-[6px_6px_0px_0px_#000] mx-auto">{isRecording ? 'Listening...' : 'Tap to Record'}</div>
                                    </>
                                ) : (
                                    <div className="flex gap-6 w-full px-4 animate-pop">
                                        <button onClick={handleTryAgain} className="flex-1 py-7 bg-[#FDE047] rounded-3xl brutal-btn font-black text-2xl flex items-center justify-center gap-3"><Icons.RotateCcw size={32}/> TRY AGAIN</button>
                                        <button onClick={handleNext} className="flex-1 py-7 bg-white rounded-3xl brutal-btn font-black text-2xl flex items-center justify-center gap-3 text-slate-500">SKIP <Icons.ArrowRight size={32}/></button>
                                    </div>
                                )}
                            </div>
                        )}
                        {!showFeedback && quizMode !== 'speak' && (
                            <button onClick={() => checkResult()} disabled={!userInput} className="w-full py-8 bg-black text-white rounded-[40px] font-black text-4xl brutal-btn shadow-[10px_10px_0px_0px_#000] mb-12 uppercase tracking-widest">CHECK <Icons.ArrowRight size={48} /></button>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="flex-1 flex items-center justify-center p-10 text-center animate-pop h-full">
                        <div className="brutal-card-heavy w-full p-12 rounded-[60px] bg-white border-b-[15px] shadow-2xl">
                            <div className="w-32 h-32 bg-[#FDE047] rounded-[40px] border-4 border-black flex items-center justify-center mx-auto mb-10 rotate-6 shadow-[12px_12px_0px_0px_#000]"><Icons.Zap size={80} /></div>
                            <h2 className="text-5xl font-black mb-4 italic uppercase tracking-tighter text-black">DONE!</h2>
                            <p className="text-slate-400 font-bold text-2xl mb-12 uppercase tracking-[0.3em]">{user.name}</p>
                            <div className="text-[160px] font-black text-[#5D5FEF] mb-16 tracking-tighter leading-none text-center w-full">{Math.round((score/15)*100)}<span className="text-5xl text-slate-300 ml-2 font-black">pts</span></div>
                            <button onClick={() => setView('coach')} className="w-full py-8 bg-black text-white rounded-[40px] font-black text-4xl brutal-btn shadow-[12px_12px_0px_0px_#000] uppercase tracking-widest">BACK TO COACH</button>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
