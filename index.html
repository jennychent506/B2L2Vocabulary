<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabPop B2L2: My Mouth's in Airplane Mode!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: linear-gradient(180deg, #FFF9E6 0%, #FFD1D1 100%);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        #root {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        .brital-card-heavy {
            background: white;
            border: 5px solid #000;
            box-shadow: 12px 12px 0px 0px #000;
        }

        .brutal-btn {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px 0px #000;
            transition: all 0.1s ease;
            touch-action: manipulation;
        }

        .brutal-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px 0px #000;
        }

        .brutal-input {
            border: 4px solid #000;
            border-radius: 18px;
            padding: 16px;
            outline: none;
            font-weight: 800;
            width: 100%;
            background: white;
            font-size: 22px;
        }

        .underline-input {
            border: none;
            border-bottom: 6px solid #5D5FEF;
            background: #F8FAFC;
            padding: 16px;
            width: 100%;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            outline: none;
        }

        .syllable-bubble {
            border: 3px solid #000;
            padding: 5px 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 18px;
        }

        .match-item {
            border: 3px solid #F9A8D4;
            background: white;
            padding: 14px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 16px;
            text-align: center;
        }

        .match-item.selected { background: #F9A8D4; color: white; transform: scale(0.95); }
        .match-item.correct { background: #86EFAC; border-color: #22C55E; color: #14532D; }

        .mic-recording {
            animation: pulse-red 0.8s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.6); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }

        .pattern-dots {
            background-image: radial-gradient(#00000022 1.5px, transparent 1.5px);
            background-size: 16px 16px;
        }

        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ⚠️ 已填入您的 Google Apps Script 部署網址
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQVDLuSQnV3bYPyfStwsPUY8UQrePglY3476At9p4SCcXUcIJOZutv7-6OVPXyFVu7/exec"; 

        const Icons = {
            Zap: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="currentColor" className={p.className}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
            Volume2: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Book: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Coach: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Mic: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
            Keyboard: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg>,
            Pen: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/><path d="M9.5 14.5L16 8"/></svg>,
            ArrowRight: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
            RotateCcw: (p) => <svg width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        };

        const vocabList = [
            { word: "warn", type: "vt.", ipa: "/wɔːrn/", syllables: ["warn"], stress: 0, meaning: "警告；提醒", family: "warning (n.) 警告", matchPairs: [["issue a warning", "發佈警告"], ["warn of danger", "警告危險"]], fillBlank: { s: "Bill's parents ___ him not to go mountain climbing because a typhoon was coming.", a: "warned", t: "比爾的父母警告他不要去登山。" } },
            { word: "announcement", type: "n.", ipa: "/əˈnaʊns.mənt/", syllables: ["an", "nounce", "ment"], stress: 1, meaning: "公告；通知", family: "announce (v.) 宣布", matchPairs: [["make an announcement", "發表公告"], ["official announcement", "官方通知"]], fillBlank: { s: "Our English teacher made an ___ that there would be a test on Thursday.", a: "announcement", t: "老師宣佈週四將有一場考試。" } },
            { word: "research", type: "n.", ipa: "/ˈriː.sɜːrtʃ/", syllables: ["re", "search"], stress: 0, meaning: "研究", family: "researcher (n.) 研究人員", matchPairs: [["conduct research", "進行研究"], ["scientific research", "科學研究"]], fillBlank: { s: "Dr. Smith is doing some ___ into how dolphins communicate with each other.", a: "research", t: "史密斯博士正在研究海豚通訊。" } },
            { word: "flavor", type: "n.", ipa: "/ˈfleɪ.vər/", syllables: ["fla", "vor"], stress: 0, meaning: "味道；風味", family: "flavoring (n.) 調味", matchPairs: [["add flavor to", "增加風味"], ["artificial flavor", "人工調味"]], fillBlank: { s: "The tea that is grown in this mountain village has a gentle ___ of flowers.", a: "flavor", t: "這個山村種植的茶帶有淡淡花香。" } },
            { word: "pressure", type: "n.", ipa: "/ˈpreʃ.ər/", syllables: ["pres", "sure"], stress: 0, meaning: "壓力", family: "-", matchPairs: [["under great pressure", "壓力很大"], ["high blood pressure", "高血壓"]], fillBlank: { s: "The nurses are under great ___ to work long hours during the pandemic.", a: "pressure", t: "護理師們面臨超時工作的巨大壓力。" } },
            { word: "normally", type: "adv.", ipa: "/ˈnɔːr.mə.li/", syllables: ["nor", "mal", "ly"], stress: 0, meaning: "通常", family: "normal (adj.) 正常的", matchPairs: [["normally happen", "通常發生"], ["normal condition", "正常情況"]], fillBlank: { s: "Uncle Frank ___ reads the newspaper over breakfast, but today he watched TV.", a: "normally", t: "法蘭克叔叔通常邊吃早餐邊看報紙。" } },
            { word: "distinguish", type: "v.", ipa: "/dɪˈstɪŋ.ɡwɪʃ/", syllables: ["dis", "tin", "guish"], stress: 1, meaning: "分辨；區別", family: "-", matchPairs: [["distinguish between", "辨別差異"], ["distinguish A from B", "區別 A 與 B"]], fillBlank: { s: "Nancy and her twin sister look so similar that even their parents can't ___ between them.", a: "distinguish", t: "南西與她的雙胞胎姊妹長得太像了。" } },
            { word: "accurately", type: "adv.", ipa: "/ˈæk.jə.rət.li/", syllables: ["ac", "cu", "rate", "ly"], stress: 0, meaning: "精確地", family: "accurate (adj.) 精確的", matchPairs: [["predict accurately", "準確預測"], ["calculate accurately", "精確計算"]], fillBlank: { s: "So far scientists have not found a way to predict earthquakes ___.", a: "accurately", t: "到目前為止，科學家尚未能準確預測地震。" } },
            { word: "function", type: "v.", ipa: "/ˈfʌŋk.ʃən/", syllables: ["func", "tion"], stress: 0, meaning: "運作；功能", family: "functional (adj.) 實用的", matchPairs: [["perform a function", "發揮功能"], ["function as a bed", "充當床鋪"]], fillBlank: { s: "Malcolm's favorite couch also ___ as a bed when one of his friends stays over.", a: "functions", t: "這幅沙發在朋友留宿時也可以充當床鋪。" } },
            { word: "blame", type: "vt.", ipa: "/bleɪm/", syllables: ["blame"], stress: 0, meaning: "歸咎；責怪", family: "-", matchPairs: [["blame someone for", "因某事責怪某人"], ["be to blame", "該受責備"]], fillBlank: { s: "The police ___ the drunken driver for the terrible car accident.", a: "blamed", t: "警方將這場意外歸咎於該名酒駕司機。" } },
            { word: "affect", type: "vt.", ipa: "/əˈfekt/", syllables: ["af", "fect"], stress: 1, meaning: "影響", family: "effect (n.) 影響", matchPairs: [["seriously affect", "嚴重影響"], ["affect the outcome", "影響結果"]], fillBlank: { s: "Global warming has greatly ___ the lives of many wild animals.", a: "affected", t: "全球暖化已極大地影響了野生動物的生活。" } },
            { word: "passenger", type: "n.", ipa: "/ˈpæs.ən.dʒər/", syllables: ["pas", "sen", "ger"], stress: 0, meaning: "乘客", family: "-", matchPairs: [["bus passenger", "公車乘客"], ["passenger seat", "乘客座位"]], fillBlank: { s: "___ on the plane were glad to hear that the weather was fine.", a: "Passengers", t: "飛機上的乘客很高興聽到天氣良好。" } },
            { word: "distract", type: "vt.", ipa: "/dɪˈstrækt/", syllables: ["dis", "tract"], stress: 1, meaning: "使分心", family: "distraction (n.) 分心物", matchPairs: [["distract from", "使...分心"], ["easily distracted", "容易分心"]], fillBlank: { s: "Ken was trying to study, but the loud music from next door kept ___ him.", a: "distracting", t: "肯試著唸書，但隔壁傳來的音樂聲一直讓他分心。" } },
            { word: "indicate", type: "vt.", ipa: "/ˈɪn.dɪ.keɪt/", syllables: ["in", "di", "cate"], stress: 0, meaning: "指出；顯示", family: "indication (n.) 跡象", matchPairs: [["clearly indicate", "清楚指出"], ["indicate a change", "顯示改變"]], fillBlank: { s: "Recent research clearly ___ that only 3% of the children get enough exercise.", a: "indicates", t: "最近的研究指出，只有 3% 孩童運動足夠。" } },
            { word: "solution", type: "n.", ipa: "/səˈluː.ʃən/", syllables: ["so", "lu", "tion"], stress: 1, meaning: "解決方法", family: "solve (v.) 解決", matchPairs: [["find a solution", "尋找對策"], ["solution to the problem", "問題解法"]], fillBlank: { s: "The government is trying to think of a ___ to the problem of air pollution.", a: "solution", t: "政府正試圖想出解決空氣污染的方法。" } }
        ];

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState({ name: '', class: '', no: '', xp: 0 });
            const [currentWordIdx, setCurrentWordIdx] = useState(0);
            const [quizMode, setQuizMode] = useState(null); 
            const [shuffledQuiz, setShuffledQuiz] = useState([]);
            const [quizIndex, setQuizIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [score, setScore] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [recognitionText, setRecognitionText] = useState('');
            const [submitting, setSubmitting] = useState(false);

            const recognitionRef = useRef(null);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.85;
                window.speechSynthesis.speak(u);
            };

            const startQuiz = (mode) => {
                const q = [...vocabList].sort(() => Math.random() - 0.5).slice(0, 15);
                setShuffledQuiz(q);
                setQuizMode(mode);
                setQuizIndex(0);
                setScore(0);
                setUserInput('');
                setShowFeedback(false);
                setRecognitionText('');
                setView('quiz');
            };

            const checkResult = (resultIsCorrect = null) => {
                const cur = shuffledQuiz[quizIndex];
                let ok = resultIsCorrect;
                
                if (ok === null) {
                    if(quizMode === 'spell') ok = userInput.trim().toLowerCase() === cur.word.toLowerCase();
                    if(quizMode === 'fill') ok = userInput.trim().toLowerCase() === cur.fillBlank.a.toLowerCase();
                }

                setIsCorrect(ok);
                setShowFeedback(true);
                
                if (ok || quizMode !== 'speak') {
                    if(ok) setScore(s => s + 1);
                    setTimeout(handleNext, 1500);
                }
            };

            const handleNext = () => {
                if(quizIndex < shuffledQuiz.length - 1) {
                    setQuizIndex(i => i + 1);
                    setUserInput('');
                    setRecognitionText('');
                    setShowFeedback(false);
                    setIsCorrect(null);
                } else handleSubmitScore();
            };

            const handleSubmitScore = async () => {
                setView('result');
                const finalPerc = Math.round((score / 15) * 100);
                if (GOOGLE_SCRIPT_URL) {
                    setSubmitting(true);
                    try {
                        // ✨ 這次傳送加入了 mode 欄位
                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                name: user.name, 
                                class: user.class, 
                                no: user.no, 
                                score: finalPerc,
                                mode: quizMode.toUpperCase() // 這裡是測驗類型
                            })
                        });
                    } catch (e) {}
                    setSubmitting(false);
                }
            };

            const handleStartRecording = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("手機瀏覽器不支援語音辨識。請確保在 iOS Safari 或 Android Chrome 中開啟網址。");
                    return;
                }

                if (isRecording) {
                    recognitionRef.current?.stop();
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                recognitionRef.current = recognition;

                recognition.onstart = () => {
                    setIsRecording(true);
                    setRecognitionText('');
                };

                recognition.onresult = (event) => {
                    const speech = event.results[0][0].transcript.toLowerCase().trim().replace(/[.,!?;:]/g, "");
                    const target = shuffledQuiz[quizIndex].word.toLowerCase();
                    setRecognitionText(speech);
                    checkResult(speech === target || speech.includes(target) || target.includes(speech));
                };

                recognition.onerror = (err) => {
                    setIsRecording(false);
                    if (err.error === 'no-speech') alert("沒聽到聲音，請再試一次！");
                    else if (err.error === 'not-allowed') alert("請允許開啟麥克風權限！");
                    else alert("錄音失敗：" + err.error + "。建議重新整理頁面。");
                };

                recognition.onend = () => {
                    setIsRecording(false);
                };

                try {
                    recognition.start();
                } catch(e) {
                    console.error(e);
                    setIsRecording(false);
                }
            };

            if (view === 'login') {
                return (
                    <div className="flex-1 flex items-center justify-center p-8">
                        <div className="brutal-card-heavy w-full p-10 rounded-[45px] text-center bg-white shadow-2xl">
                            <div className="w-24 h-24 bg-[#FDE047] rounded-full border-4 border-black flex items-center justify-center mx-auto mb-8 shadow-[8px_8px_0px_0px_#000]"><Icons.Zap size={48} /></div>
                            <h1 className="text-5xl font-black italic tracking-tighter mb-4"><span className="text-[#5D5FEF]">VOCAB</span><span className="text-[#D946EF]">POP</span></h1>
                            <p className="text-slate-400 font-bold text-base mb-12 tracking-[0.2em] uppercase">Student Login</p>
                            <form className="space-y-6 text-left" onSubmit={e => { e.preventDefault(); if(user.name&&user.class&&user.no) setView('learn'); }}>
                                <div className="flex gap-4">
                                    <div className="flex-1"><label className="block font-black mb-2 text-sm text-slate-500 uppercase">Class *</label><input className="brutal-input" placeholder="104" value={user.class} onChange={e => setUser({...user, class: e.target.value})} required /></div>
                                    <div className="flex-1"><label className="block font-black mb-2 text-sm text-slate-500 uppercase">No. *</label><input className="brutal-input" placeholder="15" value={user.no} onChange={e => setUser({...user, no: e.target.value})} required /></div>
                                </div>
                                <div><label className="block font-black mb-2 text-sm text-slate-500 uppercase">Name *</label><input className="brutal-input" placeholder="王小明" value={user.name} onChange={e => setUser({...user, name: e.target.value})} required /></div>
                                <button type="submit" className="w-full py-6 bg-[#5D5FEF] text-white rounded-3xl font-black text-2xl brutal-btn flex items-center justify-center gap-3 mt-4">START <Icons.ArrowRight size={28} /></button>
                            </form>
                        </div>
                    </div>
                );
            }

            const NavHeader = () => (
                <div className="w-full px-6 pt-6 pb-2 sticky top-0 z-50">
                    <div className="brutal-card bg-white rounded-[28px] p-4 flex justify-between items-center shadow-[8px_8px_0px_0px_#000]">
                        <div className="flex items-center gap-4">
                            <Icons.Zap size={28} className="text-yellow-400 fill-current" />
                            <div className="flex flex-col"><span className="font-black text-xl italic leading-none text-slate-800">VOCABPOP</span><span className="text-[12px] text-slate-400 font-bold uppercase mt-1">{user.class}-{user.no} {user.name}</span></div>
                        </div>
                        <div className="bg-black text-white rounded-full px-5 py-2 flex items-center gap-2 text-sm font-black"><span className="text-yellow-400">★ 1</span><span>{user.xp} XP</span></div>
                    </div>
                    <div className="flex gap-4 mt-4 px-1">
                        <button onClick={() => setView('learn')} className={`flex-1 py-4 brutal-btn rounded-2xl font-black text-base flex items-center justify-center gap-2 ${view === 'learn' ? 'bg-[#A5F3FC] translate-y-1 shadow-none' : 'bg-white'}`}><Icons.Book size={20} /> LEARN</button>
                        <button onClick={() => setView('coach')} className={`flex-1 py-4 brutal-btn rounded-2xl font-black text-base flex items-center justify-center gap-2 ${view === 'coach' ? 'bg-[#F9A8D4] translate-y-1 shadow-none' : 'bg-white'}`}><Icons.Coach size={20} /> COACH</button>
                    </div>
                </div>
            );

            if (view === 'learn') {
                const w = vocabList[currentWordIdx];
                return (
                    <div className="flex-1 flex flex-col pb-8">
                        <NavHeader />
                        <div className="px-6 mt-2 flex-1 animate-pop">
                            <div className="brutal-card-heavy rounded-[40px] overflow-hidden flex flex-col h-full">
                                <div className="bg-[#5D5FEF] p-8 text-center pattern-dots relative">
                                    <div className="absolute top-4 left-4 bg-black text-white text-[12px] font-black px-3 py-1 rounded-lg">{w.type}</div>
                                    <div className="bg-black/20 text-white text-[14px] font-bold px-4 py-1 rounded-full inline-block mb-3">{w.ipa}</div>
                                    <h2 className="text-6xl font-black text-white mb-6 tracking-tight">{w.word}</h2>
                                    <div className="flex justify-center gap-3 mb-8">{w.syllables.map((s, i) => <div key={i} className={`syllable-bubble ${i === w.stress ? 'bg-[#FDE047]' : 'bg-white/30 text-white border-white/40'}`}>{s}</div>)}</div>
                                    <button onClick={() => speak(w.word)} className="w-18 h-18 bg-white rounded-full flex items-center justify-center mx-auto brutal-btn shadow-[6px_6px_0px_0px_#000]"><Icons.Volume2 size={40} /></button>
                                </div>
                                <div className="p-8 flex-1 space-y-6 overflow-y-auto">
                                    <div>
                                        <h3 className="font-black text-lg flex items-center gap-2 uppercase text-slate-800 mb-2"><div className="w-3 h-3 bg-yellow-400 border-2 border-black rounded-full"></div> Meaning</h3>
                                        <p className="text-slate-600 font-bold text-2xl border-l-6 border-slate-100 pl-4">{w.meaning}</p>
                                    </div>
                                    <div className="bg-emerald-50/50 p-5 rounded-3xl border-2 border-emerald-200"><p className="text-base font-bold text-slate-700 italic">"{w.fillBlank.s.replace('___', w.word)}"</p></div>
                                </div>
                                <div className="p-6 pt-0 flex justify-between gap-4">
                                    <button disabled={currentWordIdx === 0} onClick={() => setCurrentWordIdx(i => i-1)} className="flex-1 py-5 brutal-btn bg-slate-100 rounded-3xl font-black text-lg">PREV</button>
                                    <button onClick={() => setCurrentWordIdx(i => (i+1)%vocabList.length)} className="flex-1 py-5 brutal-btn bg-[#FDE047] rounded-3xl font-black text-lg">NEXT</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'coach') {
                return (
                    <div className="flex-1 flex flex-col">
                        <NavHeader />
                        <div className="px-6 mt-6 mb-12 flex-1 flex flex-col justify-between animate-pop">
                            {[
                                { m: 'speak', t: 'PRO SPEAK', d: '發音挑戰 (隨機 15 題)', c: '#86EFAC', i: <Icons.Mic size={45}/> },
                                { m: 'spell', t: 'SPELL IT', d: '單字聽寫挑戰 (15 題)', c: '#93C5FD', i: <Icons.Keyboard size={45}/> },
                                { m: 'fill', t: 'FILL IN', d: '例句搭配克漏字 (15 題)', c: '#FDBA74', i: <Icons.Pen size={45}/> }
                            ].map((b, i) => (
                                <button key={i} onClick={() => startQuiz(b.m)} className="flex-1 brutal-card-heavy p-6 flex items-center gap-8 rounded-[40px] min-h-[110px]" style={{backgroundColor: b.c}}>
                                    <div className="bg-white p-5 rounded-3xl border-4 border-black shadow-[6px_6px_0px_0px_#000]">{b.i}</div>
                                    <div className="text-left"><div className="font-black text-3xl mb-1 text-black tracking-tight">{b.t}</div><div className="text-sm font-bold opacity-70 uppercase">{b.d}</div></div>
                                    <Icons.ArrowRight size={32} className="ml-auto opacity-30 text-black" />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const cur = shuffledQuiz[quizIndex];
                return (
                    <div className="flex-1 flex flex-col p-6 animate-pop overflow-hidden">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => setView('coach')} className="px-5 py-3 brutal-btn bg-white rounded-2xl flex items-center gap-2 text-sm font-black shadow-[6px_6px_0px_0px_#000]"><Icons.RotateCcw size={20}/> EXIT</button>
                            <div className="font-black text-lg bg-black text-white px-6 py-2 rounded-full">{quizIndex + 1} / {shuffledQuiz.length}</div>
                        </div>
                        
                        <div className="brutal-card-heavy rounded-[45px] p-8 flex-1 flex flex-col justify-center items-center relative min-h-[350px] mb-10">
                            {quizMode === 'spell' && <div className="w-full text-center"><button onClick={() => speak(cur.word)} className="w-24 h-24 bg-[#A5F3FC] rounded-full brutal-btn flex items-center justify-center mb-10 mx-auto shadow-[8px_8px_0px_0px_#000]"><Icons.Volume2 size={48}/></button><p className="text-slate-800 font-black text-2xl mb-12">"{cur.meaning}"</p><input autoFocus className="underline-input" placeholder="Type word..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/></div>}
                            {quizMode === 'fill' && <div className="text-left w-full"><p className="text-3xl font-black leading-snug mb-10 text-slate-800">{cur.fillBlank.s.split('___')[0]}<span className="text-[#5D5FEF] border-b-6 border-black px-2 mx-1">{userInput || '____'}</span>{cur.fillBlank.s.split('___')[1]}</p><p className="text-lg text-slate-400 mb-12 italic border-l-6 pl-4 leading-relaxed font-bold">{cur.fillBlank.t}</p><input autoFocus className="underline-input" placeholder="Fill answer..." value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && userInput && checkResult()}/></div>}
                            {quizMode === 'speak' && <div className="w-full text-center animate-pop"><h2 className="text-7xl font-black mb-4 tracking-tighter text-slate-900 leading-none">{cur.word}</h2><div className="bg-black/5 px-8 py-3 rounded-2xl text-slate-400 text-lg font-black mb-12 italic">{cur.ipa}</div><div className="flex gap-4 justify-center mb-12">{cur.syllables.map((s, i) => <div key={i} className={`syllable-bubble border-4 ${i === cur.stress ? 'bg-[#FDE047]' : 'bg-white'}`}>{s}</div>)}</div>{recognitionText && <p className="text-blue-500 font-black text-xl animate-bounce">Hear: "{recognitionText}"</p>}</div>}
                            
                            {showFeedback && <div className={`absolute -bottom-8 left-1/2 -translate-x-1/2 p-8 rounded-3xl border-6 border-black font-black w-[90%] text-center text-2xl shadow-[10px_10px_0px_0px_#000] z-50 ${isCorrect ? 'bg-[#86EFAC]' : 'bg-[#FCA5A5]'}`}>{isCorrect ? '✨ CORRECT!' : (quizMode === 'speak' ? '❌ TRY AGAIN?' : `❌ ANS: ${cur.word}`)}</div>}
                        </div>

                        {quizMode === 'speak' && (
                            <div className="flex flex-col items-center pb-12">
                                {!showFeedback || isCorrect ? (
                                    <>
                                        <button onClick={handleStartRecording} className={`w-32 h-32 rounded-full brutal-btn flex items-center justify-center mb-8 transition-all ${isRecording ? 'mic-recording' : 'bg-[#FDE047] shadow-[10px_10px_0px_0px_#000]'}`}><Icons.Mic size={64} className={isRecording ? 'text-white' : 'text-black'} /></button>
                                        <div className="bg-white border-4 border-black px-12 py-4 rounded-full font-black text-lg uppercase tracking-[0.3em] shadow-[6px_6px_0px_0px_#000]">{isRecording ? 'Listening...' : 'Tap to Record'}</div>
                                    </>
                                ) : (
                                    <div className="flex gap-6 w-full px-4 animate-pop">
                                        <button onClick={() => { setShowFeedback(false); setIsCorrect(null); setRecognitionText(''); }} className="flex-1 py-6 bg-[#FDE047] rounded-3xl brutal-btn font-black text-xl flex items-center justify-center gap-3"><Icons.RotateCcw size={28}/> TRY AGAIN</button>
                                        <button onClick={handleNext} className="flex-1 py-6 bg-white rounded-3xl brutal-btn font-black text-xl flex items-center justify-center gap-3 text-slate-500">SKIP <Icons.ArrowRight size={28}/></button>
                                    </div>
                                )}
                            </div>
                        )}
                        {!showFeedback && quizMode !== 'speak' && (
                            <button onClick={() => checkResult()} disabled={!userInput} className="w-full py-6 bg-black text-white rounded-[32px] font-black text-3xl brutal-btn shadow-[10px_10px_0px_0px_#000] mb-12">CHECK <Icons.ArrowRight size={36} /></button>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="flex-1 flex items-center justify-center p-10 text-center animate-pop">
                        <div className="brutal-card-heavy w-full p-12 rounded-[60px] bg-white border-b-[15px]">
                            <div className="w-24 h-24 bg-[#FDE047] rounded-[40px] border-4 border-black flex items-center justify-center mx-auto mb-10 rotate-6 shadow-[12px_12px_0px_0px_#000]"><Icons.Zap size={64} /></div>
                            <h2 className="text-4xl font-black mb-4 italic uppercase tracking-tighter text-black">DONE!</h2>
                            <p className="text-slate-400 font-bold text-lg mb-12 uppercase tracking-[0.3em]">{user.name}</p>
                            <div className="text-[140px] font-black text-[#5D5FEF] mb-16 tracking-tighter leading-none">{Math.round((score/15)*100)}<span className="text-4xl text-slate-300 ml-2">pts</span></div>
                            <button onClick={() => setView('coach')} className="w-full py-8 bg-black text-white rounded-[40px] font-black text-3xl brutal-btn shadow-[12px_12px_0px_0px_#000] uppercase tracking-widest">BACK TO COACH</button>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
